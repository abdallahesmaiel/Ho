<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صراحة - رسائل مجهولة مع صور وإشعارات</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header Styles */
        .header {
            background: white;
            border-radius: 20px;
            padding: 15px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .username {
            font-weight: bold;
            color: #667eea;
        }

        .btn-logout {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            background: #e84118;
            transform: scale(0.98);
        }

        /* Main Layout */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .card h2 {
            margin-bottom: 20px;
            color: #667eea;
            border-right: 4px solid #667eea;
            padding-right: 15px;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }

        input, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Image Upload */
        .image-upload {
            border: 2px dashed #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .image-upload:hover {
            border-color: #667eea;
            background: #f8f9fa;
        }

        .image-preview {
            max-width: 100%;
            max-height: 200px;
            margin-top: 10px;
            border-radius: 12px;
            display: none;
        }

        .remove-image {
            background: #ff4757;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .remove-image:hover {
            background: #e84118;
        }

        .btn-send {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
            transition: all 0.3s ease;
        }

        .btn-send:hover {
            opacity: 0.9;
            transform: scale(0.98);
        }

        /* Messages List */
        .messages-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .message-item {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border-right: 4px solid #667eea;
            position: relative;
            transition: all 0.3s ease;
        }

        .message-item:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .message-text {
            font-size: 16px;
            margin-bottom: 10px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            margin: 10px 0;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .message-image:hover {
            transform: scale(1.02);
        }

        .message-date {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: #e84118;
            transform: scale(1.1);
        }

        .empty-messages {
            text-align: center;
            color: #999;
            padding: 40px;
        }

        /* Profile Link */
        .profile-url {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 14px;
            word-break: break-all;
        }

        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            background: #5a67d8;
            transform: scale(0.98);
        }

        /* Auth Screen */
        .auth-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .auth-card h1 {
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn-auth {
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            margin: 8px 0;
            width: 100%;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .btn-auth-google {
            background: #db4437;
        }

        .btn-auth-google:hover {
            background: #c53929;
        }

        .btn-auth-fb {
            background: #4267B2;
        }

        .btn-auth-fb:hover {
            background: #365899;
        }

        .btn-auth-anon {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .btn-auth-anon:hover {
            opacity: 0.9;
        }

        .divider {
            margin: 20px 0;
            position: relative;
            text-align: center;
        }

        .divider::before,
        .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #e0e0e0;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .divider span {
            background: white;
            padding: 0 10px;
            color: #999;
        }

        .hidden {
            display: none;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Modal for Image */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .modal-img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            color: #ff4757;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        /* Notification Badge */
        .notification-badge {
            background: #ff4757;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 10px;
            margin-right: 8px;
        }

        /* Scrollbar */
        .messages-list::-webkit-scrollbar {
            width: 8px;
        }

        .messages-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .messages-list::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .messages-list::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>

<div id="app">
    <!-- Auth Screen -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-card">
            <i class="fas fa-envelope" style="font-size: 60px; color: #667eea; margin-bottom: 20px;"></i>
            <h1>صراحة</h1>
            <p style="margin-bottom: 30px; color: #666;">منصة الرسائل المجهولة - تواصل بصدق دون الكشف عن هويتك</p>
            
            <button class="btn-auth btn-auth-google" id="googleLoginBtn">
                <i class="fab fa-google"></i> تسجيل الدخول بجوجل
            </button>
            
            <button class="btn-auth btn-auth-fb" id="facebookLoginBtn">
                <i class="fab fa-facebook-f"></i> تسجيل الدخول بفيسبوك
            </button>
            
            <div class="divider">
                <span>أو</span>
            </div>
            
            <button class="btn-auth btn-auth-anon" id="anonymousLoginBtn">
                <i class="fas fa-user-secret"></i> دخول مجهول
            </button>
            
            <p style="margin-top: 20px; font-size: 12px; color: #999;">
                ✅ آمن 100% | ❤️ رسائل مجهولة | 🖼️ إرسال صور | 🔔 إشعارات فورية
            </p>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="hidden">
        <div class="container">
            <div class="header">
                <div class="logo">📨 صراحة</div>
                <div class="user-info">
                    <img id="userAvatar" class="user-avatar" style="display: none;">
                    <span class="username" id="userName"></span>
                    <button class="btn-logout" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i> خروج
                    </button>
                </div>
            </div>

            <div class="main-content">
                <!-- Send Message Section -->
                <div class="card">
                    <h2><i class="fas fa-paper-plane"></i> أرسل رسالة مجهولة</h2>
                    
                    <div class="form-group">
                        <label>إلى من تريد إرسال الرسالة؟</label>
                        <input type="text" id="recipientUsername" placeholder="أدخل معرف المستخدم المستهدف" dir="ltr">
                    </div>
                    
                    <div class="form-group">
                        <label>نص الرسالة (اختياري)</label>
                        <textarea id="messageText" placeholder="اكتب رسالتك هنا... (لن يعرف المرسل هويتك)"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>إضافة صورة (اختياري)</label>
                        <div class="image-upload" id="imageUploadBtn">
                            <i class="fas fa-cloud-upload-alt" style="font-size: 24px;"></i>
                            <p>اضغط لرفع صورة</p>
                            <input type="file" id="imageFile" accept="image/*" style="display: none;">
                        </div>
                        <img id="imagePreview" class="image-preview">
                        <button id="removeImageBtn" class="remove-image" style="display: none;">
                            <i class="fas fa-times"></i> إزالة الصورة
                        </button>
                    </div>
                    
                    <button class="btn-send" id="sendMessageBtn">
                        <i class="fas fa-share"></i> إرسال anonymously
                    </button>
                    
                    <div style="margin-top: 25px; padding-top: 20px; border-top: 1px solid #eee;">
                        <label><i class="fas fa-link"></i> رابط ملفك الشخصي</label>
                        <div class="profile-url" id="profileUrl"></div>
                        <button class="copy-btn" id="copyProfileBtn">
                            <i class="fas fa-copy"></i> نسخ الرابط
                        </button>
                    </div>
                </div>

                <!-- Receive Messages Section -->
                <div class="card">
                    <h2>
                        <i class="fas fa-inbox"></i> رسائلك 
                        <span id="newMessagesBadge"></span>
                    </h2>
                    <div id="messagesContainer" class="messages-list">
                        <div class="loading">
                            <i class="fas fa-spinner fa-spin"></i> جاري تحميل الرسائل...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<!-- Modal for Image -->
<div id="imageModal" class="modal">
    <span class="modal-close">&times;</span>
    <img class="modal-img" id="modalImage">
</div>

<script type="module">
    // Import Firebase modules
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { 
        getAuth, 
        signInAnonymously, 
        onAuthStateChanged, 
        signOut, 
        GoogleAuthProvider, 
        FacebookAuthProvider, 
        signInWithPopup 
    } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
    import { 
        getFirestore, 
        collection, 
        addDoc, 
        query, 
        where, 
        getDocs, 
        deleteDoc, 
        doc, 
        onSnapshot, 
        orderBy, 
        serverTimestamp, 
        updateDoc 
    } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    import { 
        getStorage, 
        ref, 
        uploadBytes, 
        getDownloadURL, 
        deleteObject 
    } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-storage.js";
    import { 
        getMessaging, 
        getToken, 
        onMessage 
    } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-messaging.js";

    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyABD_gJMjIx5BBIU925Upwi_8zDbc3EDCU",
  authDomain: "you-chat-4b169.firebaseapp.com",
  databaseURL: "https://you-chat-4b169-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "you-chat-4b169",
  storageBucket: "you-chat-4b169.firebasestorage.app",
  messagingSenderId: "593383830616",
  appId: "1:593383830616:web:5117ece10972a75e95c62d",
  measurementId: "G-YJ2H5H1Q9N"
};

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const messaging = getMessaging(app);
    
    // Global variables
    let currentUser = null;
    let selectedImageFile = null;
    let unsubscribeMessages = null;
    let currentUnreadCount = 0;

    // Helper Functions
    function showToast(message, isError = false) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.backgroundColor = isError ? '#ff4757' : '#333';
        toast.style.opacity = '1';
        
        setTimeout(() => {
            toast.style.opacity = '0';
        }, 3000);
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    async function saveUserToFirestore(user) {
        try {
            const usersRef = collection(db, 'users');
            const q = query(usersRef, where('userId', '==', user.uid));
            const snapshot = await getDocs(q);
            
            let username = user.displayName || `user_${user.uid.slice(0, 8)}`;
            let photoURL = user.photoURL || null;
            
            if (snapshot.empty) {
                await addDoc(collection(db, 'users'), {
                    userId: user.uid,
                    username: username,
                    photoURL: photoURL,
                    email: user.email || null,
                    createdAt: serverTimestamp()
                });
            } else {
                // Update user data if needed
                const userDoc = snapshot.docs[0];
                if (photoURL && userDoc.data().photoURL !== photoURL) {
                    await updateDoc(doc(db, 'users', userDoc.id), { 
                        photoURL: photoURL,
                        lastLogin: serverTimestamp()
                    });
                }
            }
        } catch (error) {
            console.error('Error saving user:', error);
        }
    }

    async function requestNotificationPermission(userId) {
        if (!('Notification' in window)) {
            console.log('This browser does not support notifications');
            return;
        }

        if (Notification.permission === 'granted') {
            return;
        }

        if (Notification.permission !== 'denied') {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                try {
                    const token = await getToken(messaging, { 
                        vapidKey: 'YOUR_VAPID_KEY' // Add your VAPID key here
                    });
                    if (token) {
                        await addDoc(collection(db, 'fcmTokens'), {
                            userId: userId,
                            token: token,
                            createdAt: serverTimestamp()
                        });
                        console.log('FCM token saved');
                    }
                } catch (error) {
                    console.log('FCM not supported:', error);
                }
            }
        }
    }

    // Load and display messages
    function loadMessages(userId) {
        if (unsubscribeMessages) {
            unsubscribeMessages();
        }
        
        const container = document.getElementById('messagesContainer');
        const messagesRef = collection(db, 'messages');
        const q = query(
            messagesRef, 
            where('recipientId', '==', userId), 
            orderBy('createdAt', 'desc')
        );
        
        unsubscribeMessages = onSnapshot(q, (snapshot) => {
            if (snapshot.empty) {
                container.innerHTML = `
                    <div class="empty-messages">
                        <i class="fas fa-envelope-open-text" style="font-size: 48px; margin-bottom: 10px;"></i>
                        <br>لا توجد رسائل بعد. شارك رابطك لاستقبال الرسائل!
                    </div>
                `;
                document.getElementById('newMessagesBadge').innerHTML = '';
                currentUnreadCount = 0;
                return;
            }
            
            let html = '';
            let unreadCount = 0;
            
            snapshot.forEach(doc => {
                const msg = doc.data();
                if (!msg.read) {
                    unreadCount++;
                }
                
                html += `
                    <div class="message-item">
                        <button class="delete-btn" onclick="window.deleteMessage('${doc.id}', '${msg.imageUrl || ''}')">
                            <i class="fas fa-trash"></i>
                        </button>
                        ${msg.text ? `<div class="message-text">${escapeHtml(msg.text)}</div>` : ''}
                        ${msg.imageUrl ? `<img src="${msg.imageUrl}" class="message-image" onclick="window.showImageModal('${msg.imageUrl}')">` : ''}
                        <div class="message-date">
                            <i class="far fa-clock"></i> ${msg.createdAt ? new Date(msg.createdAt.toDate()).toLocaleString('ar-EG') : 'الآن'}
                        </div>
                    </div>
                `;
                
                // Mark message as read
                if (!msg.read) {
                    updateDoc(doc.ref, { read: true });
                }
            });
            
            container.innerHTML = html;
            
            // Update unread badge
            if (unreadCount > 0 && unreadCount !== currentUnreadCount) {
                currentUnreadCount = unreadCount;
                const badge = document.getElementById('newMessagesBadge');
                badge.innerHTML = `<span class="notification-badge">${unreadCount}</span>`;
                
                // Show browser notification
                if (Notification.permission === 'granted') {
                    new Notification('📨 رسالة جديدة في صراحة', {
                        body: `لديك ${unreadCount} رسالة جديدة`,
                        icon: 'https://via.placeholder.com/64',
                        badge: 'https://via.placeholder.com/32'
                    });
                }
            } else if (unreadCount === 0) {
                document.getElementById('newMessagesBadge').innerHTML = '';
                currentUnreadCount = 0;
            }
        }, (error) => {
            console.error('Error loading messages:', error);
            container.innerHTML = '<div class="empty-messages">حدث خطأ في تحميل الرسائل</div>';
        });
    }

    // Send message function
    async function sendMessage() {
        const recipientUsername = document.getElementById('recipientUsername').value.trim();
        const messageText = document.getElementById('messageText').value.trim();
        
        if (!recipientUsername) {
            showToast('⚠️ الرجاء إدخال اسم المستخدم المستهدف', true);
            return;
        }
        
        if (!messageText && !selectedImageFile) {
            showToast('⚠️ الرجاء كتابة رسالة أو إضافة صورة', true);
            return;
        }
        
        try {
            // Find recipient user
            const usersRef = collection(db, 'users');
            const q = query(usersRef, where('username', '==', recipientUsername));
            const snapshot = await getDocs(q);
            
            if (snapshot.empty) {
                showToast('❌ المستخدم غير موجود', true);
                return;
            }
            
            const recipient = snapshot.docs[0].data();
            let imageUrl = null;
            
            // Upload image if exists
            if (selectedImageFile) {
                const fileName = `${Date.now()}_${selectedImageFile.name}`;
                const storageRef = ref(storage, `messages/${fileName}`);
                await uploadBytes(storageRef, selectedImageFile);
                imageUrl = await getDownloadURL(storageRef);
            }
            
            // Send message
            await addDoc(collection(db, 'messages'), {
                senderId: 'anonymous',
                senderName: 'مجهول',
                recipientId: recipient.userId,
                recipientName: recipient.username,
                text: messageText || '',
                imageUrl: imageUrl,
                createdAt: serverTimestamp(),
                read: false
            });
            
            // Clear form
            document.getElementById('messageText').value = '';
            selectedImageFile = null;
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('imageFile').value = '';
            document.getElementById('removeImageBtn').style.display = 'none';
            
            showToast('✅ تم إرسال رسالتك بنجاح!');
        } catch (error) {
            console.error('Error sending message:', error);
            showToast('❌ حدث خطأ في الإرسال', true);
        }
    }

    // Delete message function
    window.deleteMessage = async function(messageId, imageUrl) {
        if (!confirm('هل تريد حذف هذه الرسالة؟')) {
            return;
        }
        
        try {
            // Delete image from storage if exists
            if (imageUrl) {
                try {
                    const imageRef = ref(storage, imageUrl);
                    await deleteObject(imageRef);
                } catch (error) {
                    console.log('Error deleting image:', error);
                }
            }
            
            // Delete message from Firestore
            await deleteDoc(doc(db, 'messages', messageId));
            showToast('🗑️ تم حذف الرسالة');
        } catch (error) {
            console.error('Error deleting message:', error);
            showToast('❌ حدث خطأ في حذف الرسالة', true);
        }
    };

    // Show image modal
    window.showImageModal = function(imageUrl) {
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');
        modal.style.display = 'flex';
        modalImg.src = imageUrl;
    };

    // Auth methods
    async function googleLogin() {
        try {
            const provider = new GoogleAuthProvider();
            const result = await signInWithPopup(auth, provider);
            await saveUserToFirestore(result.user);
            showToast(`👋 مرحباً ${result.user.displayName || 'مستخدم جديد'}`);
        } catch (error) {
            console.error('Google login error:', error);
            showToast('❌ فشل تسجيل الدخول بجوجل', true);
        }
    }
    
    async function facebookLogin() {
        try {
            const provider = new FacebookAuthProvider();
            const result = await signInWithPopup(auth, provider);
            await saveUserToFirestore(result.user);
            showToast(`👋 مرحباً ${result.user.displayName || 'مستخدم جديد'}`);
        } catch (error) {
            console.error('Facebook login error:', error);
            showToast('❌ فشل تسجيل الدخول بفيسبوك', true);
        }
    }
    
    async function anonymousLogin() {
        try {
            const result = await signInAnonymously(auth);
            await saveUserToFirestore(result.user);
            showToast('👤 تم تسجيل الدخول كمستخدم مجهول');
        } catch (error) {
            console.error('Anonymous login error:', error);
            showToast('❌ فشل تسجيل الدخول', true);
        }
    }
    
    async function logout() {
        try {
            await signOut(auth);
            if (unsubscribeMessages) {
                unsubscribeMessages();
            }
            showToast('👋 تم تسجيل الخروج بنجاح');
        } catch (error) {
            console.error('Logout error:', error);
            showToast('❌ حدث خطأ في تسجيل الخروج', true);
        }
    }

    // Listen to messages while app is open
    onMessage(messaging, (payload) => {
        console.log('Message received:', payload);
        showToast(payload.notification?.body || '📨 لديك رسالة جديدة');
    });

    // Auth state observer
    onAuthStateChanged(auth, async (user) => {
        const authScreen = document.getElementById('authScreen');
        const mainApp = document.getElementById('mainApp');
        
        if (user) {
            currentUser = user;
            authScreen.classList.add('hidden');
            mainApp.classList.remove('hidden');
            
            // Get user data
            const usersRef = collection(db, 'users');
            const q = query(usersRef, where('userId', '==', user.uid));
            const snapshot = await getDocs(q);
            
            let username = `user_${user.uid.slice(0, 8)}`;
            let photoURL = null;
            
            if (!snapshot.empty) {
                const userData = snapshot.docs[0].data();
                username = userData.username;
                photoURL = userData.photoURL;
            }
            
            // Update UI
            document.getElementById('userName').innerHTML = `<i class="fas fa-user-circle"></i> ${username}`;
            
            if (photoURL) {
                const avatar = document.getElementById('userAvatar');
                avatar.src = photoURL;
                avatar.style.display = 'inline-block';
            }
            
            // Generate profile URL
            const profileUrl = `${window.location.origin}${window.location.pathname}?profile=${encodeURIComponent(username)}`;
            document.getElementById('profileUrl').innerHTML = `<i class="fas fa-link"></i> ${profileUrl}`;
            
            // Load messages
            loadMessages(user.uid);
            
            // Request notification permission
            await requestNotificationPermission(user.uid);
        } else {
            authScreen.classList.remove('hidden');
            mainApp.classList.add('hidden');
            currentUser = null;
            if (unsubscribeMessages) {
                unsubscribeMessages();
            }
        }
    });

    // Event Listeners
    document.getElementById('googleLoginBtn')?.addEventListener('click', googleLogin);
    document.getElementById('facebookLoginBtn')?.addEventListener('click', facebookLogin);
    document.getElementById('anonymousLoginBtn')?.addEventListener('click', anonymousLogin);
    document.getElementById('logoutBtn')?.addEventListener('click', logout);
    document.getElementById('sendMessageBtn')?.addEventListener('click', sendMessage);
    
    // Image upload handlers
    const imageUploadBtn = document.getElementById('imageUploadBtn');
    const imageFile = document.getElementById('imageFile');
    const imagePreview = document.getElementById('imagePreview');
    const removeImageBtn = document.getElementById('removeImageBtn');
    
    imageUploadBtn?.addEventListener('click', () => {
        imageFile.click();
    });
    
    imageFile?.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file && file.type.startsWith('image/')) {
            selectedImageFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreview.src = e.target.result;
                imagePreview.style.display = 'block';
                removeImageBtn.style.display = 'inline-block';
            };
            reader.readAsDataURL(file);
        } else if (file) {
            showToast('⚠️ الرجاء اختيار صورة صالحة', true);
        }
    });
    
    removeImageBtn?.addEventListener('click', () => {
        selectedImageFile = null;
        imagePreview.style.display = 'none';
        imageFile.value = '';
        removeImageBtn.style.display = 'none';
    });
    
    // Copy profile link
    document.getElementById('copyProfileBtn')?.addEventListener('click', () => {
        const urlElement = document.getElementById('profileUrl');
        const url = urlElement.innerText.replace('🔗 ', '');
        navigator.clipboard.writeText(url).then(() => {
            showToast('📋 تم نسخ الرابط! شاركه ليصل إليك رسائل مجهولة');
        }).catch(() => {
            showToast('❌ فشل نسخ الرابط', true);
        });
    });
    
    // Modal close handlers
    const modal = document.getElementById('imageModal');
    const modalClose = document.querySelector('.modal-close');
    
    modalClose?.addEventListener('click', () => {
        modal.style.display = 'none';
    });
    
    modal?.addEventListener('click', (e) => {
        if (e.target === modal) {
            modal.style.display = 'none';
        }
    });
    
    // Check for profile in URL
    const urlParams = new URLSearchParams(window.location.search);
    const profileParam = urlParams.get('profile');
    if (profileParam) {
        const recipientInput = document.getElementById('recipientUsername');
        if (recipientInput) {
            recipientInput.value = profileParam;
            showToast(`✍️ اكتب رسالتك إلى ${profileParam}`);
        }
    }
    
    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.style.display === 'flex') {
            modal.style.display = 'none';
        }
    });
    
    console.log('✅ تطبيق صراحة جاهز للعمل!');
</script>
</body>
</html>
