<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="منصة الرسائل المجهولة - تواصل بصدق دون الكشف عن هويتك">
    <meta name="theme-color" content="#667eea">
    <title>صراحة | منصة الرسائل المجهولة</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5a67d8;
            --secondary: #764ba2;
            --danger: #ff4757;
            --danger-dark: #e84118;
            --success: #00b894;
            --dark: #2d3436;
            --light: #f8f9fa;
            --gray: #6c757d;
            --border: #e0e0e0;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
            --shadow-sm: 0 5px 15px rgba(0,0,0,0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            color: var(--dark);
            position: relative;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Header Styles */
        .header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
            flex-wrap: wrap;
            gap: 15px;
            transition: var(--transition);
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            background: none;
            -webkit-text-fill-color: var(--primary);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary);
        }

        .username {
            font-weight: bold;
            color: var(--primary);
            font-size: 16px;
        }

        .btn-logout {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-logout:hover {
            background: var(--danger-dark);
            transform: translateY(-2px);
        }

        /* Main Layout */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            animation: fadeInUp 0.6s ease;
        }

        @media (max-width: 968px) {
            .main-content {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        /* Cards */
        .card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .card h2 {
            margin-bottom: 25px;
            color: var(--primary);
            border-right: 4px solid var(--primary);
            padding-right: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--dark);
        }

        input, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            font-size: 16px;
            transition: var(--transition);
            background: white;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Image Upload */
        .image-upload {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: var(--light);
        }

        .image-upload:hover {
            border-color: var(--primary);
            background: rgba(102, 126, 234, 0.05);
            transform: translateY(-2px);
        }

        .image-preview {
            max-width: 100%;
            max-height: 200px;
            margin-top: 10px;
            border-radius: 12px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .remove-image {
            background: var(--danger);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 12px;
            transition: var(--transition);
        }

        .remove-image:hover {
            background: var(--danger-dark);
            transform: scale(0.95);
        }

        .btn-send {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-send:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-send:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Messages List */
        .messages-list {
            max-height: 600px;
            overflow-y: auto;
            padding: 5px;
        }

        .message-item {
            background: var(--light);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border-right: 4px solid var(--primary);
            position: relative;
            transition: var(--transition);
            animation: slideIn 0.3s ease;
        }

        .message-item:hover {
            transform: translateX(-5px);
            box-shadow: var(--shadow-sm);
        }

        .message-text {
            font-size: 16px;
            margin-bottom: 10px;
            word-wrap: break-word;
            line-height: 1.5;
            padding-left: 35px;
        }

        .message-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            margin: 10px 0;
            cursor: pointer;
            transition: var(--transition);
        }

        .message-image:hover {
            transform: scale(1.02);
        }

        .message-date {
            font-size: 12px;
            color: var(--gray);
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-btn:hover {
            background: var(--danger-dark);
            transform: scale(1.1);
        }

        .empty-messages {
            text-align: center;
            color: var(--gray);
            padding: 60px 20px;
        }

        .empty-messages i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Profile Link */
        .profile-section {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .profile-url {
            background: var(--light);
            padding: 12px;
            border-radius: 12px;
            margin-top: 10px;
            font-size: 14px;
            word-break: break-all;
            font-family: monospace;
        }

        .copy-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 10px;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .copy-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        /* Auth Screen */
        .auth-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            animation: fadeIn 0.6s ease;
        }

        .auth-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: var(--shadow);
            animation: slideUp 0.6s ease;
        }

        .auth-icon {
            font-size: 80px;
            color: var(--primary);
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        .auth-card h1 {
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 36px;
        }

        .btn-auth {
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 0;
            width: 100%;
            transition: var(--transition);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-auth-google {
            background: #db4437;
        }

        .btn-auth-google:hover {
            background: #c53929;
            transform: translateY(-2px);
        }

        .btn-auth-fb {
            background: #4267B2;
        }

        .btn-auth-fb:hover {
            background: #365899;
            transform: translateY(-2px);
        }

        .btn-auth-anon {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        .btn-auth-anon:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .divider {
            margin: 25px 0;
            position: relative;
            text-align: center;
        }

        .divider::before,
        .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: var(--border);
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .divider span {
            background: white;
            padding: 0 10px;
            color: var(--gray);
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .feature {
            font-size: 12px;
            color: var(--gray);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .hidden {
            display: none;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: var(--dark);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            cursor: pointer;
            animation: fadeIn 0.3s ease;
        }

        .modal-img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            animation: zoomIn 0.3s ease;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            transition: var(--transition);
        }

        .modal-close:hover {
            color: var(--danger);
            transform: rotate(90deg);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--primary);
        }

        .loading i {
            font-size: 40px;
            animation: spin 1s linear infinite;
        }

        /* Notification Badge */
        .notification-badge {
            background: var(--danger);
            color: white;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 12px;
            margin-right: 8px;
            animation: pulse 1s infinite;
        }

        /* Scrollbar */
        .messages-list::-webkit-scrollbar {
            width: 8px;
        }

        .messages-list::-webkit-scrollbar-track {
            background: var(--border);
            border-radius: 10px;
        }

        .messages-list::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        .messages-list::-webkit-scrollbar-thumb:hover {
            background: var(--secondary);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            .card {
                padding: 20px;
            }
            
            .auth-card {
                padding: 30px;
            }
            
            .header {
                padding: 12px 20px;
            }
            
            .logo {
                font-size: 24px;
            }
            
            .btn-auth, .btn-send {
                padding: 12px 20px;
            }
        }

        @media (max-width: 480px) {
            .user-info {
                width: 100%;
                justify-content: space-between;
            }
            
            .features {
                gap: 10px;
            }
            
            .feature {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>

<div id="app">
    <!-- Auth Screen -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-card">
            <i class="fas fa-envelope auth-icon"></i>
            <h1>صراحة</h1>
            <p style="margin-bottom: 30px; color: var(--gray);">منصة الرسائل المجهولة - تواصل بصدق دون الكشف عن هويتك</p>
            
            <button class="btn-auth btn-auth-google" id="googleLoginBtn">
                <i class="fab fa-google"></i> تسجيل الدخول بجوجل
            </button>
            
            <button class="btn-auth btn-auth-fb" id="facebookLoginBtn">
                <i class="fab fa-facebook-f"></i> تسجيل الدخول بفيسبوك
            </button>
            
            <div class="divider">
                <span>أو</span>
            </div>
            
            <button class="btn-auth btn-auth-anon" id="anonymousLoginBtn">
                <i class="fas fa-user-secret"></i> دخول مجهول
            </button>
            
            <div class="features">
                <span class="feature"><i class="fas fa-check-circle" style="color: var(--success);"></i> آمن 100%</span>
                <span class="feature"><i class="fas fa-heart" style="color: var(--danger);"></i> رسائل مجهولة</span>
                <span class="feature"><i class="fas fa-image"></i> إرسال صور</span>
                <span class="feature"><i class="fas fa-bell"></i> إشعارات فورية</span>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="hidden">
        <div class="container">
            <div class="header">
                <div class="logo">
                    <i class="fas fa-envelope"></i>
                    <span>صراحة</span>
                </div>
                <div class="user-info">
                    <img id="userAvatar" class="user-avatar" style="display: none;">
                    <span class="username" id="userName"></span>
                    <button class="btn-logout" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i> خروج
                    </button>
                </div>
            </div>

            <div class="main-content">
                <!-- Send Message Section -->
                <div class="card">
                    <h2>
                        <i class="fas fa-paper-plane"></i>
                        أرسل رسالة مجهولة
                    </h2>
                    
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> إلى من تريد إرسال الرسالة؟</label>
                        <input type="text" id="recipientUsername" placeholder="@username" dir="ltr">
                        <small style="color: var(--gray); font-size: 12px;">أدخل اسم المستخدم المستهدف</small>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-comment"></i> نص الرسالة (اختياري)</label>
                        <textarea id="messageText" placeholder="اكتب رسالتك هنا... لن يعرف المرسل هويتك"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-image"></i> إضافة صورة (اختياري)</label>
                        <div class="image-upload" id="imageUploadBtn">
                            <i class="fas fa-cloud-upload-alt" style="font-size: 32px; margin-bottom: 10px; display: block;"></i>
                            <p>اضغط لرفع صورة</p>
                            <input type="file" id="imageFile" accept="image/*" style="display: none;">
                        </div>
                        <img id="imagePreview" class="image-preview">
                        <button id="removeImageBtn" class="remove-image" style="display: none;">
                            <i class="fas fa-times"></i> إزالة الصورة
                        </button>
                    </div>
                    
                    <button class="btn-send" id="sendMessageBtn">
                        <i class="fas fa-share"></i> إرسال anonymously
                    </button>
                    
                    <div class="profile-section">
                        <label><i class="fas fa-link"></i> رابط ملفك الشخصي</label>
                        <div class="profile-url" id="profileUrl"></div>
                        <button class="copy-btn" id="copyProfileBtn">
                            <i class="fas fa-copy"></i> نسخ الرابط
                        </button>
                        <small style="display: block; margin-top: 10px; color: var(--gray);">
                            شارك هذا الرابط ليصل إليك رسائل مجهولة
                        </small>
                    </div>
                </div>

                <!-- Receive Messages Section -->
                <div class="card">
                    <h2>
                        <i class="fas fa-inbox"></i>
                        رسائلك 
                        <span id="newMessagesBadge"></span>
                    </h2>
                    <div id="messagesContainer" class="messages-list">
                        <div class="loading">
                            <i class="fas fa-spinner fa-spin"></i>
                            <p>جاري تحميل الرسائل...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<!-- Modal for Image -->
<div id="imageModal" class="modal">
    <span class="modal-close">&times;</span>
    <img class="modal-img" id="modalImage">
</div>

        measurementId: "G-YJ2H5H1Q9N"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const messaging = getMessaging(app);
    
    // Global variables
    let currentUser = null;
    let selectedImageFile = null;
    let unsubscribeMessages = null;
    let currentUnreadCount = 0;
    let isSending = false;

    // Helper Functions
    function showToast(message, isError = false, duration = 3000) {
        const toast = document.getElementById('toast');
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${message}`;
        toast.style.backgroundColor = isError ? 'var(--danger)' : 'var(--dark)';
        toast.style.opacity = '1';
        
        setTimeout(() => {
            toast.style.opacity = '0';
        }, duration);
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatDate(timestamp) {
        if (!timestamp) return 'الآن';
        try {
            const date = timestamp.toDate();
            const now = new Date();
            const diff = now - date;
            
            // Less than 1 minute
            if (diff < 60000) return 'الآن';
            // Less than 1 hour
            if (diff < 3600000) return `منذ ${Math.floor(diff / 60000)} دقيقة`;
            // Less than 24 hours
            if (diff < 86400000) return `منذ ${Math.floor(diff / 3600000)} ساعة`;
            // Show date
            return date.toLocaleDateString('ar-EG');
        } catch (e) {
            return 'الآن';
        }
    }

    async function saveUserToFirestore(user) {
        try {
            const usersRef = collection(db, 'users');
            const q = query(usersRef, where('userId', '==', user.uid));
            const snapshot = await getDocs(q);
            
            let username = user.displayName || `user_${user.uid.slice(0, 8)}`;
            let photoURL = user.photoURL || null;
            
            if (snapshot.empty) {
                await addDoc(collection(db, 'users'), {
                    userId: user.uid,
                    username: username,
                    photoURL: photoURL,
                    email: user.email || null,
                    createdAt: serverTimestamp(),
                    lastActive: serverTimestamp()
                });
            } else {
                const userDoc = snapshot.docs[0];
                await updateDoc(doc(db, 'users', userDoc.id), { 
                    lastActive: serverTimestamp(),
                    ...(photoURL && userDoc.data().photoURL !== photoURL && { photoURL })
                });
            }
        } catch (error) {
            console.error('Error saving user:', error);
        }
    }

    // Load and display messages with virtualization
    function loadMessages(userId) {
        if (unsubscribeMessages) {
            unsubscribeMessages();
        }
        
        const container = document.getElementById('messagesContainer');
        const messagesRef = collection(db, 'messages');
        const q = query(
            messagesRef, 
            where('recipientId', '==', userId), 
            orderBy('createdAt', 'desc')
        );
        
        unsubscribeMessages = onSnapshot(q, (snapshot) => {
            if (snapshot.empty) {
                container.innerHTML = `
                    <div class="empty-messages">
                        <i class="fas fa-envelope-open-text"></i>
                        <p>لا توجد رسائل بعد</p>
                        <small>شارك رابطك لاستقبال الرسائل!</small>
                    </div>
                `;
                document.getElementById('newMessagesBadge').innerHTML = '';
                currentUnreadCount = 0;
                return;
            }
            
            let html = '';
            let unreadCount = 0;
            const messages = [];
            
            snapshot.forEach(doc => {
                const msg = doc.data();
                if (!msg.read) unreadCount++;
                messages.push({ id: doc.id, ...msg });
            });
            
            // Render messages
            messages.forEach(msg => {
                html += `
                    <div class="message-item">
                        <button class="delete-btn" onclick="window.deleteMessage('${msg.id}', '${msg.imageUrl || ''}')">
                            <i class="fas fa-trash"></i>
                        </button>
                        ${msg.text ? `<div class="message-text">${escapeHtml(msg.text)}</div>` : ''}
                        ${msg.imageUrl ? `<img src="${msg.imageUrl}" class="message-image" onclick="window.showImageModal('${msg.imageUrl}')" loading="lazy">` : ''}
                        <div class="message-date">
                            <i class="far fa-clock"></i>
                            <span>${formatDate(msg.createdAt)}</span>
                        </div>
                    </div>
                `;
                
                // Mark as read
                if (!msg.read) {
                    updateDoc(doc(db, 'messages', msg.id), { read: true, readAt: serverTimestamp() });
                }
            });
            
            container.innerHTML = html;
            
            // Update unread badge
            if (unreadCount > 0 && unreadCount !== currentUnreadCount) {
                currentUnreadCount = unreadCount;
                const badge = document.getElementById('newMessagesBadge');
                badge.innerHTML = `<span class="notification-badge">${unreadCount}</span>`;
                
                // Browser notification
                if (Notification.permission === 'granted' && document.hidden) {
                    new Notification('📨 رسالة جديدة في صراحة', {
                        body: `لديك ${unreadCount} رسالة جديدة`,
                        icon: 'https://via.placeholder.com/64',
                        badge: 'https://via.placeholder.com/32'
                    });
                }
            } else if (unreadCount === 0) {
                document.getElementById('newMessagesBadge').innerHTML = '';
                currentUnreadCount = 0;
            }
        }, (error) => {
            console.error('Error loading messages:', error);
            container.innerHTML = '<div class="empty-messages">حدث خطأ في تحميل الرسائل</div>';
        });
    }

    // Send message function with loading state
    async function sendMessage() {
        if (isSending) return;
        
        const recipientUsername = document.getElementById('recipientUsername').value.trim();
        const messageText = document.getElementById('messageText').value.trim();
        const sendBtn = document.getElementById('sendMessageBtn');
        
        if (!recipientUsername) {
            showToast('⚠️ الرجاء إدخال اسم المستخدم المستهدف', true);
            document.getElementById('recipientUsername').focus();
            return;
        }
        
        if (!messageText && !selectedImageFile) {
            showToast('⚠️ الرجاء كتابة رسالة أو إضافة صورة', true);
            document.getElementById('messageText').focus();
            return;
        }
        
        isSending = true;
        sendBtn.disabled = true;
        sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';
        
        try {
            // Find recipient user
            const usersRef = collection(db, 'users');
            const q = query(usersRef, where('username', '==', recipientUsername));
            const snapshot = await getDocs(q);
            
            if (snapshot.empty) {
                showToast('❌ المستخدم غير موجود. تأكد من اسم المستخدم', true);
                isSending = false;
                sendBtn.disabled = false;
                sendBtn.innerHTML = '<i class="fas fa-share"></i> إرسال anonymously';
                return;
            }
            
            const recipient = snapshot.docs[0].data();
            let imageUrl = null;
            
            // Upload image if exists
            if (selectedImageFile) {
                const fileName = `${Date.now()}_${selectedImageFile.name}`;
                const storageRef = ref(storage, `messages/${fileName}`);
                const uploadTask = await uploadBytes(storageRef, selectedImageFile);
                imageUrl = await getDownloadURL(storageRef);
            }
            
            // Send message
            await addDoc(collection(db, 'messages'), {
                senderId: 'anonymous',
                senderName: 'مجهول',
                recipientId: recipient.userId,
                recipientName: recipient.username,
                text: messageText || '',
                imageUrl: imageUrl,
                createdAt: serverTimestamp(),
                read: false
            });
            
            // Clear form
            document.getElementById('messageText').value = '';
            selectedImageFile = null;
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('imageFile').value = '';
            document.getElementById('removeImageBtn').style.display = 'none';
            
            showToast('✅ تم إرسال رسالتك بنجاح!');
        } catch (error) {
            console.error('Error sending message:', error);
            showToast('❌ حدث خطأ في الإرسال. حاول مرة أخرى', true);
        } finally {
            isSending = false;
            sendBtn.disabled = false;
            sendBtn.innerHTML = '<i class="fas fa-share"></i> إرسال anonymously';
        }
    }

    // Delete message function
    window.deleteMessage = async function(messageId, imageUrl) {
        if (!confirm('هل تريد حذف هذه الرسالة؟')) return;
        
        try {
            if (imageUrl) {
                try {
                    const imageRef = ref(storage, imageUrl);
                    await deleteObject(imageRef);
                } catch (error) {
                    console.log('Error deleting image:', error);
                }
            }
            
            await deleteDoc(doc(db, 'messages', messageId));
            showToast('🗑️ تم حذف الرسالة');
        } catch (error) {
            console.error('Error deleting message:', error);
            showToast('❌ حدث خطأ في حذف الرسالة', true);
        }
    };

    // Show image modal
    window.showImageModal = function(imageUrl) {
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');
        modal.style.display = 'flex';
        modalImg.src = imageUrl;
        document.body.style.overflow = 'hidden';
    };

    // Auth methods
    async function googleLogin() {
        try {
            const provider = new GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            const result = await signInWithPopup(auth, provider);
            await saveUserToFirestore(result.user);
            showToast(`👋 مرحباً ${result.user.displayName || 'مستخدم جديد'}`);
        } catch (error) {
            console.error('Google login error:', error);
            showToast('❌ فشل تسجيل الدخول بجوجل', true);
        }
    }
    
    async function facebookLogin() {
        try {
            const provider = new FacebookAuthProvider();
            const result = await signInWithPopup(auth, provider);
            await saveUserToFirestore(result.user);
            showToast(`👋 مرحباً ${result.user.displayName || 'مستخدم جديد'}`);
        } catch (error) {
            console.error('Facebook login error:', error);
            showToast('❌ فشل تسجيل الدخول بفيسبوك', true);
        }
    }
    
    async function anonymousLogin() {
        try {
            const result = await signInAnonymously(auth);
            await saveUserToFirestore(result.user);
            showToast('👤 تم تسجيل الدخول كمستخدم مجهول');
        } catch (error) {
            console.error('Anonymous login error:', error);
            showToast('❌ فشل تسجيل الدخول', true);
        }
    }
    
    async function logout() {
        try {
            await signOut(auth);
            if (unsubscribeMessages) unsubscribeMessages();
            showToast('👋 تم تسجيل الخروج بنجاح');
        } catch (error) {
            console.error('Logout error:', error);
            showToast('❌ حدث خطأ في تسجيل الخروج', true);
        }
    }

    // Listen to messages while app is open
    onMessage(messaging, (payload) => {
        console.log('Message received:', payload);
        showToast(payload.notification?.body || '📨 لديك رسالة جديدة');
    });

    // Auth state observer
    onAuthStateChanged(auth, async (user) => {
        const authScreen = document.getElementById('authScreen');
        const mainApp = document.getElementById('mainApp');
        
        if (user) {
            currentUser = user;
            authScreen.classList.add('hidden');
            mainApp.classList.remove('hidden');
            
            // Get user data
            const usersRef = collection(db, 'users');
            const q = query(usersRef, where('userId', '==', user.uid));
            const snapshot = await getDocs(q);
            
            let username = `user_${user.uid.slice(0, 8)}`;
            let photoURL = null;
            
            if (!snapshot.empty) {
                const userData = snapshot.docs[0].data();
                username = userData.username;
                photoURL = userData.photoURL;
            }
            
            // Update UI
            document.getElementById('userName').innerHTML = `<i class="fas fa-user-circle"></i> ${username}`;
            
            if (photoURL) {
                const avatar = document.getElementById('userAvatar');
                avatar.src = photoURL;
                avatar.style.display = 'inline-block';
            }
            
            // Generate profile URL
            const profileUrl = `${window.location.origin}${window.location.pathname}?profile=${encodeURIComponent(username)}`;
            document.getElementById('profileUrl').innerHTML = `<i class="fas fa-link"></i> ${profileUrl}`;
            
            // Load messages
            loadMessages(user.uid);
        } else {
            authScreen.classList.remove('hidden');
            mainApp.classList.add('hidden');
            currentUser = null;
            if (unsubscribeMessages) unsubscribeMessages();
        }
    });

    // Event Listeners
    document.getElementById('googleLoginBtn')?.addEventListener('click', googleLogin);
    document.getElementById('facebookLoginBtn')?.addEventListener('click', facebookLogin);
    document.getElementById('anonymousLoginBtn')?.addEventListener('click', anonymousLogin);
    document.getElementById('logoutBtn')?.addEventListener('click', logout);
    document.getElementById('sendMessageBtn')?.addEventListener('click', sendMessage);
    
    // Enter key shortcut for sending
    document.getElementById('messageText')?.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'Enter') {
            sendMessage();
        }
    });
    
    // Image upload handlers
    const imageUploadBtn = document.getElementById('imageUploadBtn');
    const imageFile = document.getElementById('imageFile');
    const imagePreview = document.getElementById('imagePreview');
    const removeImageBtn = document.getElementById('removeImageBtn');
    
    imageUploadBtn?.addEventListener('click', () => imageFile.click());
    
    imageFile?.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file && file.type.startsWith('image/')) {
            if (file.size > 5 * 1024 * 1024) {
                showToast('⚠️ حجم الصورة كبير جداً. الحد الأقصى 5MB', true);
                return;
            }
            selectedImageFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreview.src = e.target.result;
                imagePreview.style.display = 'block';
                removeImageBtn.style.display = 'inline-block';
            };
            reader.readAsDataURL(file);
        } else if (file) {
            showToast('⚠️ الرجاء اختيار صورة صالحة', true);
        }
    });
    
    removeImageBtn?.addEventListener('click', () => {
        selectedImageFile = null;
        imagePreview.style.display = 'none';
        imageFile.value = '';
        removeImageBtn.style.display = 'none';
    });
    
    // Copy profile link
    document.getElementById('copyProfileBtn')?.addEventListener('click', async () => {
        const urlElement = document.getElementById('profileUrl');
        const url = urlElement.innerText.replace('🔗 ', '');
        try {
            await navigator.clipboard.writeText(url);
            showToast('📋 تم نسخ الرابط! شاركه ليصل إليك رسائل مجهولة');
        } catch (err) {
            showToast('❌ فشل نسخ الرابط', true);
        }
    });
    
    // Modal close handlers
    const modal = document.getElementById('imageModal');
    const modalClose = document.querySelector('.modal-close');
    
    modalClose?.addEventListener('click', () => {
        modal.style.display = 'none';
        document.body.style.overflow = '';
    });
    
    modal?.addEventListener('click', (e) => {
        if (e.target === modal) {
            modal.style.display = 'none';
            document.body.style.overflow = '';
        }
    });
    
    // Check for profile in URL
    const urlParams = new URLSearchParams(window.location.search);
    const profileParam = urlParams.get('profile');
    if (profileParam) {
        const recipientInput = document.getElementById('recipientUsername');
        if (recipientInput) {
            recipientInput.value = profileParam;
            setTimeout(() => {
                showToast(`✍️ اكتب رسالتك إلى ${profileParam}`);
            }, 1000);
        }
    }
    
    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.style.display === 'flex') {
            modal.style.display = 'none';
            document.body.style.overflow = '';
        }
    });
    
    console.log('✅ تطبيق صراحة جاهز للعمل!');
</script>
</body>
</html>
