<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صراحة - منصة الرسائل المجهولة</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #1f2937;
            --light: #f9fafb;
            --gray: #6b7280;
            --border: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--dark);
        }

        /* Navbar */
        .navbar {
            background: white;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--dark);
            font-weight: 500;
            transition: color 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--primary);
        }

        .user-info-nav {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .btn-logout {
            background: var(--danger);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: var(--shadow-lg);
            margin-bottom: 2rem;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border);
        }

        .card-header h2 {
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Forms */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--dark);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border);
            border-radius: 0.75rem;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-block {
            width: 100%;
            justify-content: center;
        }

        /* Messages */
        .messages-grid {
            display: grid;
            gap: 1rem;
        }

        .message-card {
            background: var(--light);
            border-radius: 1rem;
            padding: 1.25rem;
            border-right: 4px solid var(--primary);
            transition: all 0.3s;
            position: relative;
        }

        .message-card:hover {
            transform: translateX(-5px);
            box-shadow: var(--shadow);
        }

        .message-card.unread {
            background: #eef2ff;
            border-right-color: var(--warning);
        }

        .message-text {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 0.75rem;
            word-wrap: break-word;
        }

        .message-image {
            max-width: 100%;
            max-height: 250px;
            border-radius: 0.75rem;
            margin: 0.75rem 0;
            cursor: pointer;
        }

        .message-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--gray);
        }

        .delete-msg-btn {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            border-radius: 0.5rem;
            transition: all 0.3s;
        }

        .delete-msg-btn:hover {
            background: var(--danger);
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--gray);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Auth Pages */
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-card {
            background: white;
            border-radius: 2rem;
            padding: 2.5rem;
            max-width: 450px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            animation: fadeIn 0.5s ease;
        }

        .auth-card h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--primary);
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            cursor: pointer;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--dark);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .modal-img {
            max-width: 90%;
            max-height: 90%;
        }

        /* Hidden */
        .hidden {
            display: none;
        }

        /* Badge */
        .badge {
            background: var(--danger);
            color: white;
            border-radius: 50%;
            padding: 0.125rem 0.5rem;
            font-size: 0.75rem;
            margin-right: 0.25rem;
        }

        /* Loading Spinner */
        .spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .nav-container {
                flex-direction: column;
                text-align: center;
            }
            
            .card {
                padding: 1.25rem;
            }
            
            .auth-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div id="app">
    <!-- Auth Container (Login/Register) -->
    <div id="authContainer" class="auth-container">
        <!-- Login Form -->
        <div id="loginFormCard" class="auth-card">
            <h1><i class="fas fa-envelope"></i> صراحة</h1>
            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> اسم المستخدم</label>
                    <input type="text" id="loginUsername" placeholder="أدخل اسم المستخدم" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> كلمة المرور</label>
                    <input type="password" id="loginPassword" placeholder="أدخل كلمة المرور" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
                </button>
            </form>
            <div class="auth-footer">
                ليس لديك حساب؟ <a id="showRegisterBtn">سجل حساب جديد</a>
            </div>
        </div>

        <!-- Register Form -->
        <div id="registerFormCard" class="auth-card hidden">
            <h1><i class="fas fa-user-plus"></i> حساب جديد</h1>
            <form id="registerForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> اسم المستخدم</label>
                    <input type="text" id="registerUsername" placeholder="اختر اسم مستخدم (3-20 حرف)" required autocomplete="username">
                    <small style="color: var(--gray); font-size: 0.75rem;">يمكن استخدام الحروف والأرقام فقط</small>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> كلمة المرور</label>
                    <input type="password" id="registerPassword" placeholder="أدخل كلمة المرور (6 أحرف على الأقل)" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-check-circle"></i> تأكيد كلمة المرور</label>
                    <input type="password" id="registerConfirmPassword" placeholder="أعد إدخال كلمة المرور" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="registerBtn">
                    <i class="fas fa-user-plus"></i> إنشاء حساب
                </button>
            </form>
            <div class="auth-footer">
                لديك حساب؟ <a id="showLoginBtn">تسجيل الدخول</a>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="hidden">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="nav-container">
                <a href="#" class="logo">📨 صراحة</a>
                <div class="nav-links">
                    <a href="#" id="navInbox" class="active">
                        <i class="fas fa-inbox"></i> رسائلي
                    </a>
                    <a href="#" id="navSend">
                        <i class="fas fa-paper-plane"></i> إرسال رسالة
                    </a>
                    <div class="user-info-nav">
                        <span id="navUsername"></span>
                        <button class="btn-logout" id="logoutBtn">
                            <i class="fas fa-sign-out-alt"></i> خروج
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <div class="container">
            <!-- Inbox Page -->
            <div id="inboxPage">
                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-inbox"></i> رسائلي</h2>
                        <span id="unreadCountBadge" class="badge" style="display: none;">0</span>
                    </div>
                    <div id="messagesList" class="messages-grid">
                        <div class="empty-state">
                            <i class="fas fa-envelope-open-text"></i>
                            <p>لا توجد رسائل بعد</p>
                            <small>شارك رابطك مع الأصدقاء ليصلوا إليك رسائل مجهولة</small>
                        </div>
                    </div>
                    <div style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border);">
                        <label><i class="fas fa-link"></i> رابط ملفك الشخصي</label>
                        <div style="background: var(--light); padding: 0.75rem; border-radius: 0.75rem; margin-top: 0.5rem; word-break: break-all; font-size: 0.875rem;" id="profileUrl"></div>
                        <button class="btn btn-primary" id="copyProfileBtn" style="margin-top: 0.75rem;">
                            <i class="fas fa-copy"></i> نسخ الرابط
                        </button>
                    </div>
                </div>
            </div>

            <!-- Send Message Page -->
            <div id="sendPage" class="hidden">
                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-paper-plane"></i> إرسال رسالة مجهولة</h2>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> إلى من تريد إرسال الرسالة؟</label>
                        <input type="text" id="recipientUsername" placeholder="أدخل اسم المستخدم المستهدف" dir="ltr">
                        <small style="color: var(--gray);">أدخل اسم المستخدم الذي تريد إرسال الرسالة إليه</small>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-comment"></i> نص الرسالة</label>
                        <textarea id="messageText" placeholder="اكتب رسالتك هنا... لن يعرف المرسل هويتك"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-image"></i> إضافة صورة (اختياري)</label>
                        <div class="image-upload" id="imageUploadBtn" style="border: 2px dashed var(--border); border-radius: 0.75rem; padding: 1.5rem; text-align: center; cursor: pointer; transition: all 0.3s;">
                            <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; margin-bottom: 0.5rem; display: block;"></i>
                            <p>اضغط لرفع صورة</p>
                            <input type="file" id="imageFile" accept="image/*" style="display: none;">
                        </div>
                        <img id="imagePreview" style="max-width: 100%; max-height: 200px; margin-top: 0.75rem; border-radius: 0.75rem; display: none;">
                        <button id="removeImageBtn" class="btn btn-danger" style="margin-top: 0.5rem; display: none;">
                            <i class="fas fa-times"></i> إزالة الصورة
                        </button>
                    </div>
                    
                    <button class="btn btn-primary btn-block" id="sendMessageBtn">
                        <i class="fas fa-share"></i> إرسال anonymously
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>
<div id="imageModal" class="modal">
    <span style="position: absolute; top: 20px; right: 40px; color: white; font-size: 40px; cursor: pointer;" onclick="document.getElementById('imageModal').style.display='none';">&times;</span>
    <img class="modal-img" id="modalImage">
</div>

<script type="module">
    // Import Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { 
        getFirestore, 
        collection, 
        addDoc, 
        query, 
        where, 
        getDocs, 
        deleteDoc, 
        doc, 
        onSnapshot, 
        orderBy, 
        serverTimestamp, 
        updateDoc,
        setDoc,
        getDoc
    } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    import { 
        getStorage, 
        ref, 
        uploadBytes, 
        getDownloadURL, 
        deleteObject 
    } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-storage.js";

    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyABD_gJMjIx5BBIU925Upwi_8zDbc3EDCU",
        authDomain: "you-chat-4b169.firebaseapp.com",
        databaseURL: "https://you-chat-4b169-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "you-chat-4b169",
        storageBucket: "you-chat-4b169.firebasestorage.app",
        messagingSenderId: "593383830616",
        appId: "1:593383830616:web:5117ece10972a75e95c62d",
        measurementId: "G-YJ2H5H1Q9N"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);
    
    // Global variables
    let currentUser = null;
    let selectedImageFile = null;
    let unsubscribeMessages = null;
    
    // Helper Functions
    function showToast(message, isError = false) {
        const toast = document.getElementById('toast');
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${message}`;
        toast.style.backgroundColor = isError ? '#ef4444' : '#1f2937';
        toast.style.opacity = '1';
        setTimeout(() => {
            toast.style.opacity = '0';
        }, 3000);
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatDate(timestamp) {
        if (!timestamp) return 'الآن';
        try {
            const date = timestamp.toDate();
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return 'الآن';
            if (diff < 3600000) return `منذ ${Math.floor(diff / 60000)} دقيقة`;
            if (diff < 86400000) return `منذ ${Math.floor(diff / 3600000)} ساعة`;
            return date.toLocaleDateString('ar-EG');
        } catch (e) {
            return 'الآن';
        }
    }

    // Validate username
    function isValidUsername(username) {
        const usernameRegex = /^[a-zA-Z0-9_\u0600-\u06FF]{3,20}$/;
        return usernameRegex.test(username);
    }

    // Load messages for current user
    function loadMessages() {
        if (!currentUser) return;
        
        if (unsubscribeMessages) {
            unsubscribeMessages();
        }
        
        const container = document.getElementById('messagesList');
        const messagesRef = collection(db, 'messages');
        const q = query(
            messagesRef, 
            where('recipientId', '==', currentUser.username), 
            orderBy('createdAt', 'desc')
        );
        
        unsubscribeMessages = onSnapshot(q, (snapshot) => {
            if (snapshot.empty) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-envelope-open-text"></i>
                        <p>لا توجد رسائل بعد</p>
                        <small>شارك رابطك مع الأصدقاء ليصلوا إليك رسائل مجهولة</small>
                    </div>
                `;
                document.getElementById('unreadCountBadge').style.display = 'none';
                return;
            }
            
            let html = '';
            let unreadCount = 0;
            
            snapshot.forEach(doc => {
                const msg = doc.data();
                if (!msg.read) unreadCount++;
                
                html += `
                    <div class="message-card ${!msg.read ? 'unread' : ''}">
                        <div class="message-text">${escapeHtml(msg.text) || ''}</div>
                        ${msg.imageUrl ? `<img src="${msg.imageUrl}" class="message-image" onclick="window.showImageModal('${msg.imageUrl}')">` : ''}
                        <div class="message-meta">
                            <span><i class="far fa-clock"></i> ${formatDate(msg.createdAt)}</span>
                            <button class="delete-msg-btn" onclick="window.deleteMessage('${doc.id}', '${msg.imageUrl || ''}')">
                                <i class="fas fa-trash"></i> حذف
                            </button>
                        </div>
                    </div>
                `;
                
                // Mark as read
                if (!msg.read) {
                    updateDoc(doc.ref, { read: true, readAt: serverTimestamp() });
                }
            });
            
            container.innerHTML = html;
            
            // Update unread badge
            const badge = document.getElementById('unreadCountBadge');
            if (unreadCount > 0) {
                badge.textContent = unreadCount;
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }
        }, (error) => {
            console.error('Error loading messages:', error);
            container.innerHTML = '<div class="empty-state">حدث خطأ في تحميل الرسائل</div>';
        });
    }

    // Send message
    async function sendMessage() {
        const recipientUsername = document.getElementById('recipientUsername').value.trim();
        const messageText = document.getElementById('messageText').value.trim();
        const sendBtn = document.getElementById('sendMessageBtn');
        
        if (!recipientUsername) {
            showToast('⚠️ الرجاء إدخال اسم المستخدم المستهدف', true);
            document.getElementById('recipientUsername').focus();
            return;
        }
        
        if (!messageText && !selectedImageFile) {
            showToast('⚠️ الرجاء كتابة رسالة أو إضافة صورة', true);
            document.getElementById('messageText').focus();
            return;
        }
        
        sendBtn.disabled = true;
        sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';
        
        try {
            // Check if recipient exists
            const userDocRef = doc(db, 'users', recipientUsername);
            const userDoc = await getDoc(userDocRef);
            
            if (!userDoc.exists()) {
                showToast('❌ المستخدم غير موجود. تأكد من اسم المستخدم', true);
                sendBtn.disabled = false;
                sendBtn.innerHTML = '<i class="fas fa-share"></i> إرسال anonymously';
                return;
            }
            
            let imageUrl = null;
            
            // Upload image if exists
            if (selectedImageFile) {
                const fileName = `${Date.now()}_${selectedImageFile.name}`;
                const storageRef = ref(storage, `messages/${fileName}`);
                await uploadBytes(storageRef, selectedImageFile);
                imageUrl = await getDownloadURL(storageRef);
            }
            
            // Send message
            await addDoc(collection(db, 'messages'), {
                senderId: 'anonymous',
                senderName: 'مجهول',
                recipientId: recipientUsername,
                recipientName: recipientUsername,
                text: messageText || '',
                imageUrl: imageUrl,
                createdAt: serverTimestamp(),
                read: false
            });
            
            // Clear form
            document.getElementById('messageText').value = '';
            selectedImageFile = null;
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('imageFile').value = '';
            document.getElementById('removeImageBtn').style.display = 'none';
            
            showToast('✅ تم إرسال رسالتك بنجاح!');
        } catch (error) {
            console.error('Error sending message:', error);
            showToast('❌ حدث خطأ في الإرسال', true);
        } finally {
            sendBtn.disabled = false;
            sendBtn.innerHTML = '<i class="fas fa-share"></i> إرسال anonymously';
        }
    }

    // Delete message
    window.deleteMessage = async function(messageId, imageUrl) {
        if (!confirm('هل تريد حذف هذه الرسالة؟')) return;
        
        try {
            if (imageUrl) {
                try {
                    const imageRef = ref(storage, imageUrl);
                    await deleteObject(imageRef);
                } catch (e) {
                    console.log('Image delete error:', e);
                }
            }
            await deleteDoc(doc(db, 'messages', messageId));
            showToast('🗑️ تم حذف الرسالة');
        } catch (error) {
            console.error('Delete error:', error);
            showToast('❌ حدث خطأ في الحذف', true);
        }
    };

    // Show image modal
    window.showImageModal = function(imageUrl) {
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');
        modal.style.display = 'flex';
        modalImg.src = imageUrl;
    };

    // Register new user
    async function registerUser(username, password) {
        try {
            // Validate username
            if (!isValidUsername(username)) {
                showToast('⚠️ اسم المستخدم يجب أن يكون 3-20 حرف (حروف، أرقام، _ فقط)', true);
                return false;
            }
            
            // Check if username exists
            const userDocRef = doc(db, 'users', username);
            const userDoc = await getDoc(userDocRef);
            
            if (userDoc.exists()) {
                showToast('❌ اسم المستخدم موجود بالفعل', true);
                return false;
            }
            
            // Create user with username as document ID
            await setDoc(userDocRef, {
                username: username,
                password: password, // Note: In production, use proper hashing
                createdAt: serverTimestamp(),
                lastActive: serverTimestamp()
            });
            
            return true;
        } catch (error) {
            console.error('Register error:', error);
            showToast('❌ حدث خطأ في إنشاء الحساب', true);
            return false;
        }
    }

    // Login user
    async function loginUser(username, password) {
        try {
            const userDocRef = doc(db, 'users', username);
            const userDoc = await getDoc(userDocRef);
            
            if (!userDoc.exists()) {
                showToast('❌ اسم المستخدم غير موجود', true);
                return false;
            }
            
            const userData = userDoc.data();
            if (userData.password !== password) {
                showToast('❌ كلمة المرور غير صحيحة', true);
                return false;
            }
            
            // Update last active
            await updateDoc(userDocRef, {
                lastActive: serverTimestamp()
            });
            
            currentUser = { username: username, ...userData };
            return true;
        } catch (error) {
            console.error('Login error:', error);
            showToast('❌ حدث خطأ في تسجيل الدخول', true);
            return false;
        }
    }

    // Logout
    function logout() {
        currentUser = null;
        if (unsubscribeMessages) unsubscribeMessages();
        document.getElementById('mainApp').classList.add('hidden');
        document.getElementById('authContainer').classList.remove('hidden');
        document.getElementById('loginFormCard').classList.remove('hidden');
        document.getElementById('registerFormCard').classList.add('hidden');
        // Clear forms
        document.getElementById('loginUsername').value = '';
        document.getElementById('loginPassword').value = '';
        showToast('👋 تم تسجيل الخروج');
    }

    // Update UI after login
    function updateUIAfterLogin() {
        document.getElementById('authContainer').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('navUsername').innerHTML = `<i class="fas fa-user-circle"></i> ${currentUser.username}`;
        
        // Generate profile URL
        const profileUrl = `${window.location.origin}${window.location.pathname}?to=${encodeURIComponent(currentUser.username)}`;
        document.getElementById('profileUrl').innerHTML = profileUrl;
        
        // Load messages
        loadMessages();
        
        // Show inbox page
        showInboxPage();
        
        showToast(`👋 مرحباً ${currentUser.username}`);
    }

    // Page navigation
    function showInboxPage() {
        document.getElementById('inboxPage').classList.remove('hidden');
        document.getElementById('sendPage').classList.add('hidden');
        document.getElementById('navInbox').classList.add('active');
        document.getElementById('navSend').classList.remove('active');
    }
    
    function showSendPage() {
        document.getElementById('inboxPage').classList.add('hidden');
        document.getElementById('sendPage').classList.remove('hidden');
        document.getElementById('navSend').classList.add('active');
        document.getElementById('navInbox').classList.remove('active');
    }

    // Event Listeners
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        
        if (!username || !password) {
            showToast('⚠️ الرجاء ملء جميع الحقول', true);
            return;
        }
        
        const loginBtn = document.getElementById('loginBtn');
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التسجيل...';
        
        const success = await loginUser(username, password);
        
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';
        
        if (success) {
            updateUIAfterLogin();
        }
    });
    
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('registerUsername').value.trim();
        const password = document.getElementById('registerPassword').value;
        const confirmPassword = document.getElementById('registerConfirmPassword').value;
        
        if (!username || !password || !confirmPassword) {
            showToast('⚠️ الرجاء ملء جميع الحقول', true);
            return;
        }
        
        if (password !== confirmPassword) {
            showToast('⚠️ كلمة المرور غير متطابقة', true);
            return;
        }
        
        if (password.length < 6) {
            showToast('⚠️ كلمة المرور يجب أن تكون 6 أحرف على الأقل', true);
            return;
        }
        
        const registerBtn = document.getElementById('registerBtn');
        registerBtn.disabled = true;
        registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإنشاء...';
        
        const success = await registerUser(username, password);
        
        registerBtn.disabled = false;
        registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> إنشاء حساب';
        
        if (success) {
            showToast('✅ تم إنشاء الحساب بنجاح! يمكنك تسجيل الدخول الآن');
            document.getElementById('registerFormCard').classList.add('hidden');
            document.getElementById('loginFormCard').classList.remove('hidden');
            document.getElementById('registerUsername').value = '';
            document.getElementById('registerPassword').value = '';
            document.getElementById('registerConfirmPassword').value = '';
            document.getElementById('loginUsername').value = username;
        }
    });
    
    document.getElementById('showRegisterBtn').addEventListener('click', () => {
        document.getElementById('loginFormCard').classList.add('hidden');
        document.getElementById('registerFormCard').classList.remove('hidden');
    });
    
    document.getElementById('showLoginBtn').addEventListener('click', () => {
        document.getElementById('registerFormCard').classList.add('hidden');
        document.getElementById('loginFormCard').classList.remove('hidden');
    });
    
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('navInbox').addEventListener('click', (e) => {
        e.preventDefault();
        showInboxPage();
    });
    
    document.getElementById('navSend').addEventListener('click', (e) => {
        e.preventDefault();
        showSendPage();
    });
    
    document.getElementById('sendMessageBtn').addEventListener('click', sendMessage);
    
    // Image upload
    const imageUploadBtn = document.getElementById('imageUploadBtn');
    const imageFileInput = document.getElementById('imageFile');
    const imagePreview = document.getElementById('imagePreview');
    const removeImageBtn = document.getElementById('removeImageBtn');
    
    if (imageUploadBtn) {
        imageUploadBtn.addEventListener('click', () => imageFileInput.click());
    }
    
    if (imageFileInput) {
        imageFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/')) {
                if (file.size > 5 * 1024 * 1024) {
                    showToast('⚠️ حجم الصورة كبير جداً (الحد 5MB)', true);
                    return;
                }
                selectedImageFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    imagePreview.src = e.target.result;
                    imagePreview.style.display = 'block';
                    removeImageBtn.style.display = 'inline-block';
                };
                reader.readAsDataURL(file);
            } else if (file) {
                showToast('⚠️ الرجاء اختيار صورة صالحة', true);
            }
        });
    }
    
    if (removeImageBtn) {
        removeImageBtn.addEventListener('click', () => {
            selectedImageFile = null;
            imagePreview.style.display = 'none';
            imageFileInput.value = '';
            removeImageBtn.style.display = 'none';
        });
    }
    
    // Copy profile link
    document.getElementById('copyProfileBtn')?.addEventListener('click', async () => {
        const urlElement = document.getElementById('profileUrl');
        const url = urlElement.innerText;
        try {
            await navigator.clipboard.writeText(url);
            showToast('📋 تم نسخ الرابط! شاركه ليصل إليك رسائل مجهولة');
        } catch (err) {
            showToast('❌ فشل نسخ الرابط', true);
        }
    });
    
    // Modal close
    const modal = document.getElementById('imageModal');
    modal?.addEventListener('click', (e) => {
        if (e.target === modal) modal.style.display = 'none';
    });
    
    // Check URL for recipient
    const urlParams = new URLSearchParams(window.location.search);
    const toParam = urlParams.get('to');
    if (toParam) {
        setTimeout(() => {
            const recipientInput = document.getElementById('recipientUsername');
            if (recipientInput) {
                recipientInput.value = toParam;
                showToast(`✍️ اكتب رسالتك إلى ${toParam}`);
            }
        }, 500);
    }
    
    // Check if user is logged in (from localStorage)
    const savedUser = localStorage.getItem('currentUser');
    if (savedUser) {
        try {
            const user = JSON.parse(savedUser);
            // Verify user still exists
            const userDocRef = doc(db, 'users', user.username);
            const userDoc = await getDoc(userDocRef);
            if (userDoc.exists()) {
                currentUser = user;
                updateUIAfterLogin();
            } else {
                localStorage.removeItem('currentUser');
            }
        } catch (e) {
            localStorage.removeItem('currentUser');
        }
    }
    
    // Save user to localStorage on login
    window.addEventListener('beforeunload', () => {
        if (currentUser) {
            localStorage.setItem('currentUser', JSON.stringify({ username: currentUser.username }));
        }
    });
    
    console.log('✅ التطبيق جاهز للعمل!');
</script>
</body>
</html>
